<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#f5f3ee" />
  <title>기억해</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow" id="roomLabel">개인 앨범</p>
        <h1>기억해</h1>
      </div>
      <button class="icon-btn" id="themeBtn" aria-label="테마 설정">☼</button>
    </header>

    <main id="viewHost" class="view-host">
      <section class="view active" data-view="today">
        <div class="hero-card glass">
          <p class="date-label" id="todayText"></p>
          <h2>오늘을 기억해 주세요.</h2>
          <p>사진 한 장이면 충분합니다. 오늘 남기고 싶은 순간을 조용히 담아보세요.</p>
        </div>

        <section class="quote-card card" aria-label="추억 문구">
          <p class="quote-text" id="homeQuote"></p>
          <p class="quote-author" id="homeQuoteAuthor"></p>
        </section>

        <form id="memoryForm" class="card form-card">
          <label class="field-label">날짜</label>
          <input id="dateInput" type="date" />

          <label class="field-label">사진 <span>필수 · 최대 3장</span></label>
          <input id="photoInput" type="file" accept="image/*" multiple />
          <div id="photoPreview" class="photo-preview empty">사진을 선택하면 여기에 표시됩니다.</div>

          <label class="field-label">그날 메뉴 <span>선택</span></label>
          <input id="menuInput" type="text" maxlength="40" placeholder="예: 김치찌개, 냉면, 집밥" />

          <label class="field-label">오늘의 기록 <span>선택</span></label>
          <textarea id="noteInput" maxlength="220" rows="4" placeholder="남기고 싶은 말이 있을 때만 적어주세요."></textarea>

          <label class="field-label">오늘의 기분</label>
          <div class="mood-grid" id="moodGrid"></div>

          <button class="primary-btn" type="submit">저장하기</button>
          <p class="hint" id="formHint"></p>
        </form>
      </section>

      <section class="view" data-view="calendar">
        <div class="section-head">
          <button class="plain-btn" id="prevMonth">‹</button>
          <h2 id="monthTitle"></h2>
          <button class="plain-btn" id="nextMonth">›</button>
        </div>
        <div class="calendar-card card">
          <div class="week-row"><span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span></div>
          <div id="calendarGrid" class="calendar-grid"></div>
        </div>
        <article id="dayDetail" class="card detail-card muted-detail">날짜를 선택하면 그날의 기록을 볼 수 있어요.</article>
      </section>

      <section class="view" data-view="shared">
        <div class="card share-card">
          <h2>함께 보는 기록</h2>
          <p>같은 앨범 코드로 묶인 기록을 한곳에서 볼 수 있게 정리합니다.</p>
          <label class="field-label">앨범 코드</label>
          <div class="row">
            <input id="roomInput" type="text" maxlength="24" placeholder="예: FAMILY2026" />
            <button class="secondary-btn" id="saveRoomBtn" type="button">적용</button>
          </div>
          <p class="hint">현재 버전은 GitHub Pages에서 실행되는 저장형 버전입니다. 다른 기기와의 실시간 동기화는 연결형 버전에서 사용할 수 있습니다.</p>
        </div>
        <div class="card search-card">
          <label class="field-label">기록 검색</label>
          <input id="searchInput" type="search" placeholder="메뉴, 오늘의 기록, 날짜 검색" />
          <div id="searchResults" class="result-list"></div>
        </div>
      </section>

      <section class="view" data-view="settings">
        <div class="card">
          <h2>테마</h2>
          <p class="subtle">기록과 사진이 먼저 보이도록 차분한 색만 남겼습니다.</p>
          <div id="themeList" class="theme-list"></div>
        </div>
      </section>
    </main>

    <nav class="tabbar">
      <button class="tab active" data-target="today"><span>오늘</span></button>
      <button class="tab" data-target="calendar"><span>달력</span></button>
      <button class="tab" data-target="shared"><span>함께</span></button>
      <button class="tab" data-target="settings"><span>설정</span></button>
    </nav>
  </div>

  <script src="app.js"></script>
</body>
</html>
